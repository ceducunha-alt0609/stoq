<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080c10">
  <title>Stoq — Offline</title>
  <style>
    :root{--bg:#060a0e;--surface:#0c1118;--border:rgba(255,255,255,.08);--text:#eef3f8;--text2:#7a9ab8;--accent:#00e5b8}
    *{box-sizing:border-box} html,body{height:100%;margin:0} body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top, rgba(0,229,184,.08), transparent 35%), var(--bg);color:var(--text);display:grid;place-items:center;padding:24px}
    .card{width:min(520px,100%);background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:28px;box-shadow:0 12px 50px rgba(0,0,0,.45)}
    .logo{width:58px;height:58px;border-radius:16px;display:grid;place-items:center;background:rgba(0,229,184,.12);border:1px solid rgba(0,229,184,.25);font-size:28px;margin-bottom:18px}
    h1{margin:0 0 8px;font-size:28px} p{margin:0 0 10px;color:var(--text2);line-height:1.5}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn{appearance:none;border:none;border-radius:14px;padding:12px 16px;font-weight:700;cursor:pointer;text-decoration:none}.btn-primary{background:var(--accent);color:#041015}.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">📦</div>
    <h1>Você está offline</h1>
    <p>O app abriu sem internet, mas alguns dados mais recentes podem não estar disponíveis agora.</p>
    <p>Quando a conexão voltar, atualize a página para sincronizar normalmente.</p>
    <div class="actions">
      <a class="btn btn-primary" href="./index.html">Tentar novamente</a>
      <button class="btn btn-secondary" onclick="location.reload()">Recarregar</button>
    </div>
  </main>
</body>
</html>
